name: CI

on:
  push:
    branches: [main, Frontend, Backend]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Frontend: lint + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Backend: install + syntax check
  # ─────────────────────────────────────────────
  backend:
    name: Backend (install + syntax check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all source files)
        # --check parses the file for syntax errors without executing it.
        # We check every .js file under api/ and db/ plus the app entry-point.
        run: |
          find . -path ./node_modules -prune -o -name "*.js" -print | \
          xargs -I {} node --check {}
