name: CI

on:
  push:
    branches: [main, Frontend, Backend]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Frontend: lint + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Backend: install + syntax check
  # ─────────────────────────────────────────────
  backend:
    name: Backend (install + syntax check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all source files)
        # --check parses the file for syntax errors without executing it.
        # We check every .js file under api/ and db/ plus the app entry-point.
        run: |
          find . -path ./node_modules -prune -o -name "*.js" -print | \
          xargs -I {} node --check {}

  # ─────────────────────────────────────────────
  # API tests: Newman + local MongoDB
  # ─────────────────────────────────────────────
  api-tests:
    name: API tests (Newman)
    runs-on: ubuntu-latest
    needs: backend   # only run if the backend syntax check passes

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Newman
        run: npm install -g newman

      - name: Start backend server
        working-directory: backend
        run: node app.js > /tmp/server.log 2>&1 &
        env:
          MONGO_URI: mongodb://localhost:27017/musicplaylist_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8888 --timeout 30000

      - name: Show server logs (on failure)
        if: failure()
        run: cat /tmp/server.log

      - name: Run Postman collection
        run: |
          newman run postman/collection.json \
            --environment postman/environment.json \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml
